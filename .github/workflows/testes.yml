name: Pipeline de Testes Unitários

on: [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest streamlit pandas

    - name: Executar os testes automatizados com Pytest
      run: |
        export PYTHONPATH=.
        pytest